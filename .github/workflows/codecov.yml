## Bug: Codecov not reporting coverage

### Summary
Codecov is not displaying any coverage data for the repository, despite tests running and a workflow configured.

---

### Expected behaviour
- Coverage reports should be uploaded to Codecov after CI runs
- Codecov dashboard should show coverage %
- Repository should not display "Configure"

---

### Actual behaviour
- Codecov shows no data
- Repository remains in "Configure" state
- No coverage appears after multiple commits

---

### Environment
- Repository: aise-sdlc-ordering
- CI: GitHub Actions
- Node version: 20
- Test framework: Jest (via `npm run test:coverage`)

---

### Workflow configuration

```yaml
name: Codecov

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}